name: Jellycat stock check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jellycat-stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_stock.py

      - name: Save state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update stock state [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed, retrying..."
              sleep 3
            done
          else
            echo "No state change to commit."
          fi
